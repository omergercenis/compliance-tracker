<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Client Hub</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f8f8fc;--surface:#ffffff;--surface2:#f0f0f7;--surface3:#e8e8f2;
  --border:rgba(0,0,0,0.08);--border2:rgba(0,0,0,0.15);
  --text:#1a1a2e;--text2:#6060a0;--text3:#a0a0c0;
  --accent:#6c63ff;--accent2:#5549e0;
  --green:#16a34a;--green-bg:rgba(22,163,74,0.08);--green-border:rgba(22,163,74,0.2);
  --amber:#d97706;--amber-bg:rgba(217,119,6,0.12);--amber-border:rgba(217,119,6,0.35);
  --red:#dc2626;--red-bg:rgba(220,38,38,0.08);--red-border:rgba(220,38,38,0.2);
  --radius:12px;--radius-lg:16px;--radius-xl:20px;
  --shadow:0 2px 12px rgba(0,0,0,0.08);
}
[data-theme="dark"]{
  --bg:#0f0f13;--surface:#18181f;--surface2:#22222c;--surface3:#2a2a36;
  --border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.12);
  --text:#f0f0f5;--text2:#9898b0;--text3:#5a5a72;
  --accent:#6c63ff;--accent2:#8b85ff;
  --green:#22c55e;--green-bg:rgba(34,197,94,0.1);--green-border:rgba(34,197,94,0.25);
  --amber:#f59e0b;--amber-bg:rgba(245,158,11,0.1);--amber-border:rgba(245,158,11,0.25);
  --red:#ef4444;--red-bg:rgba(239,68,68,0.1);--red-border:rgba(239,68,68,0.25);
  --shadow:0 2px 12px rgba(0,0,0,0.3);
}
@media(prefers-color-scheme:dark){
  :root:not([data-theme="light"]){
    --bg:#0f0f13;--surface:#18181f;--surface2:#22222c;--surface3:#2a2a36;
    --border:rgba(255,255,255,0.07);--border2:rgba(255,255,255,0.12);
    --text:#f0f0f5;--text2:#9898b0;--text3:#5a5a72;
    --accent:#6c63ff;--accent2:#8b85ff;
    --green:#22c55e;--green-bg:rgba(34,197,94,0.1);--green-border:rgba(34,197,94,0.25);
    --amber:#f59e0b;--amber-bg:rgba(245,158,11,0.1);--amber-border:rgba(245,158,11,0.25);
    --red:#ef4444;--red-bg:rgba(239,68,68,0.1);--red-border:rgba(239,68,68,0.25);
    --shadow:0 2px 12px rgba(0,0,0,0.3);
  }
}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}

/* NAV */
.nav{display:flex;align-items:center;gap:12px;padding:16px 24px;background:var(--surface);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:50;backdrop-filter:blur(12px)}
.nav-logo{font-size:16px;font-weight:700;color:var(--text);letter-spacing:-.3px;margin-right:8px}
.nav-logo span{color:var(--accent)}
.tab-btn{padding:7px 16px;border-radius:8px;font-size:13px;font-weight:500;border:none;cursor:pointer;transition:all .2s;background:transparent;color:var(--text2)}
.tab-btn:hover{background:var(--surface2);color:var(--text)}
.tab-btn.active{background:var(--accent);color:#fff}
.nav-search{margin-left:auto;position:relative}
.nav-search input{background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:7px 12px 7px 34px;font-size:13px;color:var(--text);outline:none;width:220px;transition:border-color .2s}
.nav-search input:focus{border-color:var(--accent)}
.nav-search input::placeholder{color:var(--text3)}
.search-icon{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--text3);font-size:14px;pointer-events:none}
.nav-stats{display:flex;gap:16px;margin-left:16px}
.nav-stat{font-size:12px;color:var(--text2);display:flex;align-items:center;gap:5px}
.stat-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}

/* VIEWS */
.view{display:none}.view.active{display:block}

/* CLIENTS VIEW */
.clients-wrap{padding:24px}
.clients-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:12px}
.client-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:16px;cursor:pointer;transition:all .2s;position:relative;overflow:hidden}
.client-card::before{display:none}
.client-card.c-red::before{display:none}
.client-card.c-amber::before{display:none}
.client-card.c-green::before{display:none}
.client-card.c-grey::before{display:none}
.client-card:hover{background:var(--surface2);border-color:var(--border2);transform:translateY(-2px);box-shadow:0 8px 24px rgba(0,0,0,.3)}
.card-top{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:10px}
.card-avatar{width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;flex-shrink:0;color:#fff}
.card-status-badge{font-size:10px;font-weight:600;padding:3px 8px;border-radius:6px;letter-spacing:.03em}
.badge-red{background:var(--red-bg);color:var(--red);border:1px solid var(--red-border)}
.badge-amber{background:#fef3c7;color:#b45309;border:1px solid #f59e0b}
.badge-green{background:var(--green-bg);color:var(--green);border:1px solid var(--green-border)}
.badge-grey{background:var(--surface3);color:var(--text3);border:1px solid var(--border)}
.card-name{font-size:14px;font-weight:600;margin-bottom:3px;line-height:1.3}
.card-director{font-size:12px;color:var(--text2);margin-bottom:12px}
.card-dates{display:flex;flex-direction:column;gap:5px}
.card-date-row{display:flex;align-items:center;justify-content:space-between}
.date-label{font-size:11px;color:var(--text3)}
.date-val{font-size:11px;font-weight:600}
.date-val.red{color:var(--red)}
.date-val.amber{color:var(--amber)}
.date-val.green{color:var(--green)}
.date-val.grey{color:var(--text3)}

/* TRACKER VIEW */
.tracker-wrap{display:grid;grid-template-columns:1fr 300px;min-height:calc(100vh - 57px)}
.tracker-main{padding:24px;min-width:0}
.tracker-cal{background:var(--surface);border-left:1px solid var(--border);padding:20px;position:sticky;top:57px;height:calc(100vh - 57px);overflow-y:auto}
@media(max-width:860px){.tracker-wrap{grid-template-columns:1fr}.tracker-cal{display:none}}
.tracker-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:10px}
.tracker-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:14px;cursor:pointer;transition:all .2s;position:relative}
.tracker-card::before{display:none}
.tracker-card.c-red::before{display:none}
.tracker-card.c-amber::before{display:none}
.tracker-card.c-green::before{display:none}
.tracker-card:hover{background:var(--surface2);border-color:var(--border2);transform:translateY(-1px)}
.tc-name{font-size:13px;font-weight:600;margin-bottom:3px}
.tc-num{font-size:11px;color:var(--text3);margin-bottom:10px}
.tc-rows{display:flex;flex-direction:column;gap:4px}
.tc-row{display:flex;justify-content:space-between;font-size:11px}
.tc-lbl{color:var(--text3)}
.tc-val.red{color:var(--red);font-weight:600}
.tc-val.amber{color:var(--amber);font-weight:600}
.tc-val.green{color:var(--green)}
.tc-val.grey{color:var(--text3)}
.add-row{display:flex;gap:8px;margin-bottom:20px}
.add-row input{flex:1;background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:8px 12px;font-size:13px;color:var(--text);outline:none;text-transform:uppercase;letter-spacing:.05em}
.add-row input::placeholder{text-transform:none;letter-spacing:normal;color:var(--text3)}
.add-row input:focus{border-color:var(--accent)}
.add-row button{padding:0 16px;height:36px;background:var(--accent);color:#fff;border:none;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;white-space:nowrap}
.add-row button:disabled{opacity:.4;cursor:not-allowed}
.sec-label{font-size:11px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.08em;margin-bottom:10px}

/* CALENDAR */
.cal-title{font-size:13px;font-weight:700;margin-bottom:12px;display:flex;align-items:center;justify-content:space-between}
.cal-title span{color:var(--text)}
.cal-nav{display:flex;gap:4px}
.cal-nav button{background:var(--surface2);border:1px solid var(--border);border-radius:6px;width:24px;height:24px;cursor:pointer;font-size:12px;color:var(--text2);display:flex;align-items:center;justify-content:center}
.cal-nav button:hover{background:var(--surface3)}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;margin-bottom:12px}
.cal-dow{font-size:9px;font-weight:600;color:var(--text3);text-align:center;padding:3px 0}
.cal-day{aspect-ratio:1;display:flex;align-items:center;justify-content:center;border-radius:6px;font-size:11px;cursor:default;position:relative}
.cal-day.other{color:var(--text3)}
.cal-day.today{background:var(--accent);color:#fff;font-weight:700}
.cal-day.has-ev{cursor:pointer}
.cal-day.has-ev:not(.today):hover{background:var(--surface2)}
.ev-dot{width:3px;height:3px;border-radius:50%;position:absolute;bottom:2px;left:50%;transform:translateX(-50%)}
.ev-dot.red{background:var(--red)}
.ev-dot.amber{background:var(--amber)}
.ev-dot.green{background:var(--green)}
.cal-ev-list{display:flex;flex-direction:column;gap:6px}
.cal-ev{padding:8px 10px;border-radius:8px;cursor:pointer;border-left:2px solid}
.cal-ev.red{background:var(--red-bg);border-color:var(--red)}
.cal-ev.amber{background:var(--amber-bg);border-color:var(--amber)}
.cal-ev.green{background:var(--green-bg);border-color:var(--green)}
.cal-ev-name{font-size:11px;font-weight:600}
.cal-ev-type{font-size:10px;color:var(--text2)}
.cal-ev-date{font-size:10px;font-weight:600}
.cal-ev-date.red{color:var(--red)}
.cal-ev-date.amber{color:var(--amber)}
.cal-ev-date.green{color:var(--green)}
.cal-section-lbl{font-size:10px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;margin:12px 0 6px}

/* POPUP */
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:200;align-items:center;justify-content:center;padding:16px;backdrop-filter:blur(4px)}
.overlay.open{display:flex}
.popup{background:var(--surface);border:1px solid var(--border2);border-radius:var(--radius-xl);width:min(680px,100%);max-height:88vh;overflow-y:auto;position:relative;box-shadow:0 24px 80px rgba(0,0,0,.5)}
.popup-header{padding:24px 24px 0;position:sticky;top:0;background:var(--surface);z-index:1}
.popup-close{position:absolute;top:16px;right:16px;background:var(--surface2);border:1px solid var(--border);border-radius:8px;width:32px;height:32px;cursor:pointer;font-size:14px;color:var(--text2);display:flex;align-items:center;justify-content:center}
.popup-close:hover{background:var(--surface3)}
.popup-co-name{font-size:20px;font-weight:700;margin-bottom:4px}
.popup-director{font-size:14px;color:var(--text2);margin-bottom:16px}
.popup-tabs{display:flex;gap:4px;margin-bottom:0;border-bottom:1px solid var(--border);padding-bottom:0}
.popup-tab{padding:8px 14px;font-size:13px;font-weight:500;cursor:pointer;color:var(--text2);border-bottom:2px solid transparent;margin-bottom:-1px;transition:all .15s}
.popup-tab:hover{color:var(--text)}
.popup-tab.active{color:var(--accent2);border-bottom-color:var(--accent)}
.popup-body{padding:20px 24px 24px}
.popup-tab-content{display:none}.popup-tab-content.active{display:block}

/* INFO GRID */
.info-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.info-item{background:var(--surface2);border-radius:10px;padding:12px 14px;position:relative}
.info-item.full{grid-column:1/-1}
.info-label{font-size:10px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.06em;margin-bottom:5px}
.info-value{font-size:13px;font-weight:500;color:var(--text);display:flex;align-items:center;gap:8px;word-break:break-all}
.copy-btn{background:none;border:none;cursor:pointer;color:var(--text3);font-size:12px;padding:2px 5px;border-radius:4px;flex-shrink:0;transition:all .15s}
.copy-btn:hover{background:var(--surface3);color:var(--text)}
.empty-val{color:var(--text3);font-style:italic;font-size:12px}

/* COMPLIANCE IN POPUP */
.dl-card{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:10px;border:1px solid;margin-bottom:8px}
.dl-card.ok{background:var(--green-bg);border-color:var(--green-border)}
.dl-card.warning{background:var(--amber-bg);border-color:var(--amber-border)}
.dl-card.danger{background:var(--red-bg);border-color:var(--red-border)}
.dl-card.done-card{background:var(--surface2);border-color:var(--border);opacity:.5}
.dl-card input[type=checkbox]{width:15px;height:15px;accent-color:var(--green);cursor:pointer;flex-shrink:0}
.dl-body{flex:1;min-width:0}
.dl-type{font-size:10px;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.05em;margin-bottom:2px}
.dl-label{font-size:13px;font-weight:500}
.dl-sub{font-size:11px;color:var(--text2);margin-top:1px}
.dl-right{display:flex;align-items:center;gap:6px;flex-shrink:0}
.pill{font-size:11px;padding:2px 8px;border-radius:6px;font-weight:600;white-space:nowrap}
.pill.red{background:var(--red-bg);color:var(--red)}
.pill.amber{background:var(--amber-bg);color:var(--amber)}
.pill.green{background:var(--green-bg);color:var(--green)}
.pill.overdue{background:var(--red-bg);color:var(--red);font-weight:700}
.dl-date{font-size:12px;font-weight:600;min-width:90px;text-align:right}
.dl-date.red{color:var(--red)}.dl-date.amber{color:var(--amber)}.dl-date.green{color:var(--green)}
.dl-date.done{text-decoration:line-through;color:var(--text3)}
.done-toggle{background:none;border:1px solid var(--border);border-radius:6px;padding:4px 10px;font-size:11px;color:var(--text2);cursor:pointer;margin:6px 0}

/* API KEY */
.setup-box{background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius);padding:16px;margin-bottom:16px}
.setup-box.hidden{display:none}
.setup-title{font-size:13px;font-weight:600;color:var(--accent2);margin-bottom:8px}
.setup-steps{font-size:12px;color:var(--text2);line-height:1.7;margin-bottom:10px}
.setup-row{display:flex;gap:6px}
.setup-row input{flex:1;background:var(--surface3);border:1px solid var(--border);border-radius:8px;padding:0 10px;height:32px;font-size:12px;color:var(--text);font-family:monospace;outline:none}
.setup-row input:focus{border-color:var(--accent)}
.setup-row button{padding:0 12px;height:32px;background:var(--accent);color:#fff;border:none;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer}
.api-ok{display:flex;align-items:center;gap:8px;background:var(--green-bg);border:1px solid var(--green-border);border-radius:8px;padding:8px 12px;margin-bottom:16px}
.api-ok.hidden{display:none}
.api-ok span{font-size:12px;color:var(--green);font-weight:500}
.api-change{background:none;border:none;color:var(--accent2);font-size:11px;cursor:pointer}

/* MISC */
.loading{display:flex;align-items:center;gap:8px;color:var(--text2);font-size:13px;padding:8px 0}
.spinner{width:14px;height:14px;border:2px solid var(--border2);border-top-color:var(--text);border-radius:50%;animation:spin .7s linear infinite;flex-shrink:0}
@keyframes spin{to{transform:rotate(360deg)}}
.err-msg{background:var(--red-bg);border:1px solid var(--red-border);border-radius:8px;padding:10px 14px;color:var(--red);font-size:13px;margin-bottom:12px}
.overdue-banner{background:var(--red-bg);border:1px solid var(--red-border);border-radius:8px;padding:8px 12px;font-size:13px;color:var(--red);font-weight:600;margin-bottom:12px}
.empty{text-align:center;padding:48px;color:var(--text3);font-size:14px}
hr{border:none;border-top:1px solid var(--border);margin:16px 0}
</style>
</head>

// ── DB API ──
async function dbSaveTracker(num, data) {
  // profile objesi çok büyük olabilir, sadece gerekli kısımları sakla
  const slim = { name: data.name, dl: data.dl, nextDue: data.nextDue,
    profile: data.profile ? {
      company_name: data.profile.company_name,
      company_number: data.profile.company_number,
      company_status: data.profile.company_status,
      type: data.profile.type,
      date_of_creation: data.profile.date_of_creation,
      confirmation_statement: data.profile.confirmation_statement,
      accounts: data.profile.accounts,
    } : null
  };
  await fetch('/db/tracker', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({company_num:num, data:slim})});
}

async function dbDeleteTracker(num) {
  await fetch('/db/tracker/'+num, {method:'DELETE'});
}

async function dbSaveDone(key, checked) {
  await fetch('/db/done', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({key, checked})});
}

async function loadFromDB() {
  try {
    const [tr, dn] = await Promise.all([
      fetch('/db/tracker').then(r=>r.json()),
      fetch('/db/done').then(r=>r.json())
    ]);
    trackerData = tr || {};
    doneItems = dn || {};
    // dl status'ları yeniden hesapla (tarihler değişmiş olabilir)
    Object.values(trackerData).forEach(c => {
      if (c.dl) c.dl = c.dl.map(d => ({...d, status: getStatus(d.date)}));
    });
  } catch(e) {
    console.log('DB load error, using localStorage fallback', e);
    trackerData = JSON.parse(localStorage.getItem('ch_tracker') || '{}');
    doneItems = JSON.parse(localStorage.getItem('ch_done') || '{}');
  }
}

function persist() {
  // localStorage fallback olarak tut
  localStorage.setItem('ch_tracker', JSON.stringify(trackerData));
  localStorage.setItem('ch_done', JSON.stringify(doneItems));
}

// ── COLORS ──
const COLORS = ['#6c63ff','#22c55e','#f59e0b','#ef4444','#06b6d4','#ec4899','#8b5cf6','#14b8a6','#f97316','#84cc16'];
function getColor(name) {
  let h = 0; for(let c of name) h = (h*31+c.charCodeAt(0))&0xffff;
  return COLORS[h % COLORS.length];
}
function initials(name) {
  return name.split(' ').slice(0,2).map(w=>w[0]).join('').toUpperCase();
}

// ── DATE UTILS ──
function getStatus(ds) {
  if (!ds) return {type:'grey',days:null};
  const d = new Date(ds); d.setHours(0,0,0,0);
  const diff = Math.round((d-today)/86400000);
  if (diff < 0) return {type:'red',days:Math.abs(diff),overdue:true};
  if (diff <= 30) return {type:'red',days:diff};
  if (diff <= 60) return {type:'amber',days:diff};
  return {type:'green',days:diff};
}
function fmt(s) {
  if (!s) return '—';
  return new Date(s).toLocaleDateString('en-GB',{day:'2-digit',month:'short',year:'numeric'});
}
function fmtShort(s) {
  if (!s) return '—';
  return new Date(s).toLocaleDateString('en-GB',{day:'2-digit',month:'short'});
}
function addYear(s) {
  if (!s) return null;
  const d = new Date(s); d.setFullYear(d.getFullYear()+1);
  return d.toISOString().split('T')[0];
}
function daysLabel(s) {
  if (!s.days && s.days !== 0) return '';
  if (s.overdue) return s.days+'g gecikti';
  return s.days+'g kaldı';
}
function dotColor(dl) {
  if (!dl || !dl.length) return 'grey';
  if (dl.some(d=>d.status&&(d.status.type==='red'))) return 'red';
  if (dl.some(d=>d.status&&d.status.type==='amber')) return 'amber';
  return 'green';
}

// ── DEADLINES ──
function buildDL(p) {
  const cs = p.confirmation_statement?.next_due;
  const csLast = p.confirmation_statement?.last_made_up_to;
  const acc = p.accounts?.next_due;
  const accEnd = p.accounts?.next_accounts?.period_end_on;
  return [
    {id:'cs',type:'Confirmation Statement',label:'Son beyan tarihi',date:cs,sub:csLast?'Son CS: '+fmt(csLast):null,status:getStatus(cs)},
    {id:'acc',type:'Accounts',label:'Hesap beyanı son tarihi',date:acc,sub:accEnd?'Dönem sonu: '+fmt(accEnd):null,status:getStatus(acc)},
  ];
}
function buildAll(dl) {
  return [...dl, ...dl.map(d=>({...d,id:d.id+'_nx',date:addYear(d.date),status:getStatus(addYear(d.date)),sub:'Tahmini sonraki dönem',isNext:true}))];
}

// ── NAV STATS ──
function updateStats() {
  let r=0,a=0,g=0;
  Object.values(trackerData).forEach(c=>{
    if(!c.dl) return;
    const dc = dotColor(c.dl);
    if(dc==='red') r++;
    else if(dc==='amber') a++;
    else if(dc==='green') g++;
  });
  document.getElementById('statRed').textContent = r;
  document.getElementById('statAmber').textContent = a;
  document.getElementById('statGreen').textContent = g;
}

function renderClients() {
  const grid = document.getElementById('clientsGrid');
  let clients = CLIENTS_DATA;
  if(searchQ) clients = clients.filter(c=>c.name.toLowerCase().includes(searchQ)||c.director.toLowerCase().includes(searchQ)||(c.companyNo||'').includes(searchQ));

  if(!clients.length){grid.innerHTML='<div class="empty">Sonuç bulunamadı</div>';return;}

  // Merge with tracker dot
  const sorted = clients.slice().sort((a,b)=>{
    const da = trackerData[a.companyNo.padStart(8,'0')];
    const db = trackerData[b.companyNo.padStart(8,'0')];
    const order = {red:0,amber:1,green:2,grey:3};
    const oa = order[da?dotColor(da.dl):'grey']??3;
    const ob = order[db?dotColor(db.dl):'grey']??3;
    if(oa!==ob) return oa-ob;
    const nd_a = da?.nextDue||'9999'; const nd_b = db?.nextDue||'9999';
    return nd_a.localeCompare(nd_b);
  });

  grid.innerHTML = sorted.map(c=>{
    const num = c.companyNo.padStart(8,'0');
    const td = trackerData[num];
    const dc = td ? dotColor(td.dl) : 'grey';
    const dl = td?.dl || [];
    const cs = dl.find(d=>d.id==='cs');
    const acc = dl.find(d=>d.id==='acc');
    const badgeMap = {red:'badge-red',amber:'badge-amber',green:'badge-green',grey:'badge-grey'};
    const badgeText = {red:'⚠ Acil',amber:'Yaklaşıyor',green:'Tamam',grey:'Bilinmiyor'};
    const dotClr = {red:'var(--red)',amber:'var(--amber)',green:'var(--green)',grey:'var(--text3)'};
    return `<div class="client-card c-${dc}" onclick="openClientPopup('${c.companyNo}')">
      <div class="card-top">
        <div style="width:12px;height:12px;border-radius:50%;background:${dotClr[dc]||dotClr.grey};flex-shrink:0;margin-top:3px;box-shadow:0 0 6px ${dotClr[dc]||dotClr.grey}"></div>
        <span class="card-status-badge ${badgeMap[dc]}">${badgeText[dc]}</span>
      </div>
      <div class="card-name">${c.name}</div>
      <div class="card-director">${c.director}</div>
      <div class="card-dates">
        <div class="card-date-row">
          <span class="date-label">CS</span>
          <span class="date-val ${cs?cs.status.type:'grey'}">${cs&&cs.date?fmtShort(cs.date):'—'}</span>
        </div>
        <div class="card-date-row">
          <span class="date-label">Accounts</span>
          <span class="date-val ${acc?acc.status.type:'grey'}">${acc&&acc.date?fmtShort(acc.date):'—'}</span>
        </div>
      </div>
    </div>`;
  }).join('');
}

// TRACKER VIEW
// ─────────────────────────────────────────────
function renderTracker() {
  const grid = document.getElementById('trackerGrid');
  let keys = Object.keys(trackerData);
  if(searchQ) keys = keys.filter(k=>{
    const c = trackerData[k];
    return (c.name||'').toLowerCase().includes(searchQ)||(k).includes(searchQ);
  });

  if(!keys.length){grid.innerHTML='<div class="empty">Henüz şirket eklenmedi</div>';return;}

  const order={red:0,amber:1,green:2};
  keys.sort((a,b)=>{
    const oa=order[dotColor(trackerData[a].dl)]??3, ob=order[dotColor(trackerData[b].dl)]??3;
    if(oa!==ob) return oa-ob;
    return (trackerData[a].nextDue||'9999').localeCompare(trackerData[b].nextDue||'9999');
  });

  grid.innerHTML = keys.map(num=>{
    const c = trackerData[num];
    const dc = dotColor(c.dl);
    const dl = c.dl||[];
    const cs = dl.find(d=>d.id==='cs');
    const acc = dl.find(d=>d.id==='acc');
    return `<div class="tracker-card c-${dc}" onclick="openTrackerPopup('${num}')">
      <div class="tc-name">${c.name}</div>
      <div class="tc-num">${num}</div>
      <div class="tc-rows">
        <div class="tc-row"><span class="tc-lbl">CS</span><span class="tc-val ${cs?cs.status.type:'grey'}">${cs&&cs.date?fmtShort(cs.date):'—'}</span></div>
        <div class="tc-row"><span class="tc-lbl">Accounts</span><span class="tc-val ${acc?acc.status.type:'grey'}">${acc&&acc.date?fmtShort(acc.date):'—'}</span></div>
      </div>
    </div>`;
  }).join('');
  updateStats();
}

async function addCompany() {
  if(!apiKey){alert('Önce API key girin!');return;}
  const raw = document.getElementById('regInput').value.trim();
  if(!raw) return;
  const num = raw.replace(/[^A-Za-z0-9]/g,'').toUpperCase().padStart(8,'0');
  document.getElementById('addBtn').disabled=true;
  document.getElementById('addStatus').innerHTML='<div class="loading"><div class="spinner"></div>Sorgulanıyor...</div>';
  try {
    const r = await fetch(API_BASE+'/company/'+num+'?apikey='+encodeURIComponent(apiKey));
    if(!r.ok) throw new Error('HTTP '+r.status);
    const profile = await r.json();
    const dl = buildDL(profile);
    const nextDue = dl.map(d=>d.date).filter(Boolean).sort()[0]||'9999';
    trackerData[num]={name:profile.company_name,profile,dl,nextDue};
    persist();
    await dbSaveTracker(num, trackerData[num]);
    document.getElementById('addStatus').innerHTML='';
    document.getElementById('regInput').value='';
    renderTracker();renderCal();
  } catch(e) {
    document.getElementById('addStatus').innerHTML='<div class="err-msg">Hata: '+e.message+'</div>';
  }
  document.getElementById('addBtn').disabled=false;
}

        <div class="dl-type">${dl.type}${dl.isNext?' · sonraki yıl':''}</div>

        <div class="dl-date ${s.type}">${fmt(dl.date)}</div>
      </div>
    </div>`;
  });
  if(done.length){
    html+=`<button class="done-toggle" onclick="toggleDone('${num}')">${showDone[num]?'▲':'▼'} Tamamlananlar (${done.length})</button>
    <div style="display:${showDone[num]?'block':'none'}">`;
    done.forEach(dl=>{
      html+=`<div class="dl-card done-card">
        <input type="checkbox" checked onchange="markDone('${num}','${dl.id}',this.checked)">
        <div class="dl-body"><div class="dl-type">${dl.type}</div><div class="dl-label" style="text-decoration:line-through;color:var(--text3)">${dl.label}</div></div>
        <div class="dl-right"><span class="pill green">✓ Tamam</span><div class="dl-date done">${fmt(dl.date)}</div></div>
      </div>`;
    });
    html+='</div>';
  }
  return html;
}

function markDone(num,id,checked) {
  const key=num+'_'+id;
  if(checked) doneItems[key]=true; else delete doneItems[key];
  persist();
  dbSaveDone(key, checked);
  if(trackerData[num]) {
    const all=buildAll(trackerData[num].dl);
    trackerData[num].dotColor=dotColor(all.filter(d=>!doneItems[num+'_'+d.id]));
    persist();
  }
  // reopen popup
  if(trackerData[num]) openTrackerPopup(num);
  else if(getClientByNo(num)) openClientPopup(num);
  renderTracker();renderClients();renderCal();
}

function toggleDone(num){showDone[num]=!showDone[num];if(trackerData[num])openTrackerPopup(num);else openClientPopup(num);}

function copyVal(val,btn){
  navigator.clipboard.writeText(val).then(()=>{
    btn.textContent='✅'; setTimeout(()=>btn.textContent='📋',1500);
  });
}

function closePopup(){document.getElementById('overlay').classList.remove('open');document.body.style.overflow='';}
function handleOverlayClick(e){if(e.target===document.getElementById('overlay'))closePopup();}
document.addEventListener('keydown',e=>{if(e.key==='Escape')closePopup();});

// ─────────────────────────────────────────────
// CALENDAR
// ─────────────────────────────────────────────
function calPrev(){calM--;if(calM<0){calM=11;calY--;}renderCal();}
function calNext(){calM++;if(calM>11){calM=0;calY++;}renderCal();}
function calNow(){calY=today.getFullYear();calM=today.getMonth();renderCal();}

function allEvents(){
  const evs=[];
  Object.entries(trackerData).forEach(([num,c])=>{
    if(!c.dl) return;
    c.dl.forEach(d=>{
      if(!d.date) return;
      evs.push({num,name:c.name,type:d.type,date:d.date,status:d.status});
    });
  });
  return evs;
}

function renderCal(){
  const months=['Ocak','Şubat','Mart','Nisan','Mayıs','Haziran','Temmuz','Ağustos','Eylül','Ekim','Kasım','Aralık'];
  document.getElementById('calLabel').textContent=months[calM]+' '+calY;
  const evs=allEvents();
  const byDate={};
  evs.forEach(e=>{if(!byDate[e.date])byDate[e.date]=[];byDate[e.date].push(e);});

  const first=new Date(calY,calM,1).getDay();
  const days=new Date(calY,calM+1,0).getDate();
  const offset=(first+6)%7;

  let html=['Mo','Tu','We','Th','Fr','Sa','Su'].map(d=>`<div class="cal-dow">${d}</div>`).join('');
  for(let i=0;i<offset;i++){
    const pd=new Date(calY,calM,-offset+i+1).getDate();
    html+=`<div class="cal-day other">${pd}</div>`;
  }
  for(let d=1;d<=days;d++){
    const ds=calY+'-'+String(calM+1).padStart(2,'0')+'-'+String(d).padStart(2,'0');
    const isT=today.getFullYear()===calY&&today.getMonth()===calM&&today.getDate()===d;
    const de=byDate[ds]||[];
    const dc=de.length?(de.some(e=>e.status.type==='red')?'red':de.some(e=>e.status.type==='amber')?'amber':'green'):'';
    html+=`<div class="cal-day${isT?' today':''}${de.length?' has-ev':''}" ${de.length?'onclick="calDayClick(\''+ds+'\')"':''}>${d}${dc?'<div class="ev-dot '+dc+'"></div>':''}</div>`;
  }
  const rem=(7-(offset+days)%7)%7;
  for(let i=1;i<=rem;i++) html+=`<div class="cal-day other">${i}</div>`;
  document.getElementById('calGrid').innerHTML=html;

  const ms=calY+'-'+String(calM+1).padStart(2,'0')+'-01';
  const me=calY+'-'+String(calM+1).padStart(2,'0')+'-'+String(days).padStart(2,'0');
  const mEvs=evs.filter(e=>e.date>=ms&&e.date<=me).sort((a,b)=>a.date.localeCompare(b.date));
  if(!mEvs.length){document.getElementById('calEvents').innerHTML='<div style="font-size:12px;color:var(--text3)">Bu ay son tarihi yok</div>';return;}
  document.getElementById('calEvents').innerHTML=mEvs.map(e=>{
    const sc=e.status.type==='red'?'red':e.status.type==='amber'?'amber':'green';
    return `<div class="cal-ev ${sc}" onclick="openTrackerPopup('${e.num}')">
      <div class="cal-ev-name">${e.name}</div>
      <div class="cal-ev-type">${e.type}</div>
      <div class="cal-ev-date ${sc}">${fmt(e.date)}</div>
    </div>`;
  }).join('');
}

function calDayClick(ds){
  const evs=allEvents().filter(e=>e.date===ds);
  if(!evs.length) return;
  if(evs.length===1){openTrackerPopup(evs[0].num);return;}
  // multi
  document.getElementById('popupName').textContent=fmt(ds)+' — Son Tarihler';
  document.getElementById('popupDirector').textContent='';
  document.getElementById('popupTabs').innerHTML='';
  document.getElementById('popupBody').innerHTML='<div style="display:flex;flex-direction:column;gap:8px;padding-top:8px">'+evs.map(e=>{
    const sc=e.status.type==='red'?'red':e.status.type==='amber'?'amber':'green';
    return `<div class="cal-ev ${sc}" onclick="closePopup();openTrackerPopup('${e.num}')"><div class="cal-ev-name">${e.name}</div><div class="cal-ev-type">${e.type}</div></div>`;
  }).join('')+'</div>';
  document.getElementById('overlay').classList.add('open');
  document.body.style.overflow='hidden';
}

// ─────────────────────────────────────────────
// INIT — eski tracker datasını migrate et
// ─────────────────────────────────────────────
function migrateOldData(){
  const old = JSON.parse(localStorage.getItem('ch_saved')||'{}');
  const oldTracker = JSON.parse(localStorage.getItem('ch_tracker')||'{}');
  const combined = {...old, ...oldTracker};
  Object.entries(combined).forEach(([num,c])=>{
    if(!trackerData[num]&&c.profile){
      const dl=buildDL(c.profile);
      const nextDue=dl.map(d=>d.date).filter(Boolean).sort()[0]||'9999';
      trackerData[num]={name:c.name||c.profile.company_name,profile:c.profile,dl,nextDue};
      dbSaveTracker(num, trackerData[num]);
    }
  });
  persist();
}

function toggleTheme(){
  const html=document.documentElement;
  const cur=html.getAttribute('data-theme');
  const isDark=cur==='dark'||(cur===null&&window.matchMedia('(prefers-color-scheme:dark)').matches);
  const next=isDark?'light':'dark';
  html.setAttribute('data-theme',next);
  localStorage.setItem('theme',next);
  document.getElementById('themeBtn').textContent=next==='dark'?'☀️':'🌙';
}
function initTheme(){
  const saved=localStorage.getItem('theme');
  if(saved){
    document.documentElement.setAttribute('data-theme',saved);
    document.getElementById('themeBtn').textContent=saved==='dark'?'☀️':'🌙';
  } else {
    const prefersDark=window.matchMedia('(prefers-color-scheme:dark)').matches;
    document.getElementById('themeBtn').textContent=prefersDark?'☀️':'🌙';
  }
}

// ── LOGIN ──
const LOGIN_PASS = 'Gercenis24';
function tryLogin() {
  const val = document.getElementById('loginInput').value;
  if (val === LOGIN_PASS) {
    sessionStorage.setItem('auth', '1');
    document.getElementById('loginScreen').style.display = 'none';
    document.getElementById('mainApp').style.display = 'block';
    startApp();
  } else {
    document.getElementById('loginErr').style.display = 'block';
    document.getElementById('loginInput').value = '';
    document.getElementById('loginInput').focus();
  }
}

function checkAuth() {
  const navLogo = document.querySelector('#mainApp img');
  if (navLogo) document.getElementById('loginLogo').src = navLogo.src;
  if (sessionStorage.getItem('auth') === '1') {
    document.getElementById('loginScreen').style.display = 'none';
    document.getElementById('mainApp').style.display = 'block';
    startApp();
  } else {
    document.getElementById('loginScreen').style.display = 'flex';
    document.getElementById('mainApp').style.display = 'none';
    setTimeout(() => document.getElementById('loginInput').focus(), 100);
  }
}

async function startApp() {
  document.getElementById('clientsGrid').innerHTML = '<div class="empty" style="grid-column:1/-1">Yükleniyor...</div>';
  await loadFromDB();
  migrateOldData();
  renderClients();
  updateStats();
  renderCal();
}

renderApiStatus();
initTheme();
checkAuth();
